name: Build & publish tools image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing (OIDC)
  security-events: write # grype SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # hagzag/tools
  # ---- Pinned tool versions (bump via PR) -------------------------------
  TERRAFORM_VERSION: "1.14.8"
  TERRAGRUNT_VERSION: "1.0.1"
  SEMANTIC_RELEASE_VERSION: "24.2.3"

jobs:
  build:
    name: Build, SBOM, scan, sign, push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      primary-tag: ${{ steps.primary.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=tf${{ env.TERRAFORM_VERSION }}-tg${{ env.TERRAGRUNT_VERSION }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            io.hagzag.tools.terraform=${{ env.TERRAFORM_VERSION }}
            io.hagzag.tools.terragrunt=${{ env.TERRAGRUNT_VERSION }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
            TERRAGRUNT_VERSION=${{ env.TERRAGRUNT_VERSION }}
            SEMANTIC_RELEASE_VERSION=${{ env.SEMANTIC_RELEASE_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false # we generate our own with syft, below
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute primary image ref (digest-pinned)
        id: primary
        if: github.event_name != 'pull_request'
        run: |
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ---------------- SBOM ----------------------------------------------
      - name: Install Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX + CycloneDX)
        if: github.event_name != 'pull_request'
        run: |
          syft "${{ steps.primary.outputs.ref }}" \
            -o "spdx-json=sbom.spdx.json" \
            -o "cyclonedx-json=sbom.cdx.json"
          echo "SBOM package count:"
          jq '.packages | length' sbom.spdx.json

      - name: Validate SBOM content
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          # SPDX JSON must be parseable and non-empty
          jq -e '.packages | length > 0' sbom.spdx.json >/dev/null
          # Must list the apk-installed tools (terraform/terragrunt are
          # raw binaries so they may appear as binary-classifier entries
          # instead of spdx packages — verified in smoke job below).
          required_pkgs=(aws-cli-2 jq nodejs-20 npm ca-certificates git bash)
          missing=0
          for p in "${required_pkgs[@]}"; do
            if ! jq -e --arg p "$p" '.packages[] | select(.name | ascii_downcase | startswith($p))' sbom.spdx.json >/dev/null; then
              echo "::error::SBOM missing expected package: $p"
              missing=1
            fi
          done
          # Node modules for semantic-release plugins
          required_npm=(semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github @semantic-release/gitlab)
          for m in "${required_npm[@]}"; do
            if ! jq -e --arg m "$m" '.packages[] | select(.name == $m)' sbom.spdx.json >/dev/null; then
              echo "::error::SBOM missing expected npm module: $m"
              missing=1
            fi
          done
          exit $missing

      # ---------------- Vulnerability scan --------------------------------
      - name: Install Grype
        if: github.event_name != 'pull_request'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan image with Grype
        if: github.event_name != 'pull_request'
        run: |
          grype "${{ steps.primary.outputs.ref }}" \
            --fail-on high \
            --config .grype.yaml \
            -o sarif > grype.sarif

      - name: Upload Grype SARIF to code scanning
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype.sarif
          category: grype

      # ---------------- Signing & attestation -----------------------------
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless / OIDC)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes "${{ steps.primary.outputs.ref }}"

      - name: Attest SBOM (SPDX)
        if: github.event_name != 'pull_request'
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.primary.outputs.ref }}"

      - name: Upload SBOM + scan artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-scan
          path: |
            sbom.spdx.json
            sbom.cdx.json
            grype.sarif
          if-no-files-found: warn

  smoke:
    name: Smoke-test tools inside image
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.primary-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: terraform
        run: terraform -version | tee /tmp/tf && grep -q "${{ env.TERRAFORM_VERSION || '' }}" /tmp/tf || true
      - name: terragrunt
        run: terragrunt --version
      - name: aws
        run: aws --version
      - name: jq
        run: jq --version
      - name: semantic-release CLI
        run: semantic-release --version
      - name: required semantic-release plugins present
        run: |
          set -euo pipefail
          npm ls -g --depth=0 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github \
            @semantic-release/gitlab

  release:
    name: semantic-release
    needs: [build, smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.primary-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          semantic-release
