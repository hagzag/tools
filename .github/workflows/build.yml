name: Build & publish tools image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # release
  packages: write
  id-token: write # cosign keyless signing (OIDC)
  security-events: write # grype SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # hagzag/tools
  # ---- Pinned tool versions (bump via PR) -------------------------------
  TERRAFORM_VERSION: "1.14.8"
  TERRAGRUNT_VERSION: "1.0.1"
  SEMANTIC_RELEASE_VERSION: "24.2.3"
  GRYPE_VERSION: "0.111.0"

jobs:
  # -----------------------------------------------------------------------
  # Build each arch in parallel, push per-arch digest to GHCR.
  # Registry cache (ghcr.io/.../tools:buildcache-<arch>) survives GHA
  # cache eviction and is shared across runners.
  # -----------------------------------------------------------------------
  build-arch:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push (per-arch digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
            TERRAGRUNT_VERSION=${{ env.TERRAGRUNT_VERSION }}
            SEMANTIC_RELEASE_VERSION=${{ env.SEMANTIC_RELEASE_VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          provenance: false
          cache-from: |
            type=gha,scope=${{ matrix.platform }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: |
            type=gha,scope=${{ matrix.platform }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # -----------------------------------------------------------------------
  # Merge per-arch digests into a single multi-arch manifest, then run
  # SBOM, scan, sign, and attest against the merged digest.
  # -----------------------------------------------------------------------
  merge:
    name: Merge, SBOM, scan, sign, push
    runs-on: ubuntu-latest
    needs: build-arch
    if: github.event_name != 'pull_request'

    outputs:
      primary-tag: ${{ steps.primary.outputs.ref }}
      digest: ${{ steps.merge.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (full tag set)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=tf${{ env.TERRAFORM_VERSION }}-tg${{ env.TERRAGRUNT_VERSION }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            io.hagzag.tools.terraform=${{ env.TERRAFORM_VERSION }}
            io.hagzag.tools.terragrunt=${{ env.TERRAGRUNT_VERSION }}

      - name: Create and push multi-arch manifest
        id: merge
        working-directory: /tmp/digests
        run: |
          mapfile -t tag_args < <(jq -r '.tags[] | "-t " + .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t src_refs < <(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s\n' *)
          docker buildx imagetools create "${tag_args[@]}" "${src_refs[@]}"
          canonical_tag=$(jq -r '.tags[] | select(startswith("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-"))' \
            <<< "$DOCKER_METADATA_OUTPUT_JSON" | head -1)
          digest=$(docker buildx imagetools inspect "${canonical_tag}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Compute primary image ref (digest-pinned)
        id: primary
        run: |
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.merge.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ---------------- SBOM ----------------------------------------------
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          syft "${{ steps.primary.outputs.ref }}" \
            -o "spdx-json=sbom.spdx.json" \
            -o "cyclonedx-json=sbom.cdx.json"
          echo "SBOM package count:"
          jq '.packages | length' sbom.spdx.json

      - name: Validate SBOM content
        run: |
          set -euo pipefail
          jq -e '.packages | length > 0' sbom.spdx.json >/dev/null
          required_pkgs=(aws-cli-2 jq nodejs-20 npm ca-certificates git bash)
          missing=0
          for p in "${required_pkgs[@]}"; do
            if ! jq -e --arg p "$p" '.packages[] | select(.name | ascii_downcase | startswith($p))' sbom.spdx.json >/dev/null; then
              echo "::error::SBOM missing expected package: $p"
              missing=1
            fi
          done
          required_npm=(semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/git @semantic-release/exec @semantic-release/github @semantic-release/gitlab)
          for m in "${required_npm[@]}"; do
            if ! jq -e --arg m "$m" '.packages[] | select(.name == $m)' sbom.spdx.json >/dev/null; then
              echo "::error::SBOM missing expected npm module: $m"
              missing=1
            fi
          done
          exit $missing

      # ---------------- Vulnerability scan --------------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${{ env.GRYPE_VERSION }}"

      - name: Scan image with Grype
        run: |
          grype "${{ steps.primary.outputs.ref }}" \
            --fail-on high \
            --config .grype.yaml \
            -o sarif > grype.sarif

      - name: Upload Grype SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype.sarif
          category: grype

      # ---------------- Signing & attestation -----------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless / OIDC)
        run: |
          cosign sign --yes "${{ steps.primary.outputs.ref }}"

      - name: Attest SBOM (SPDX)
        continue-on-error: true
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.primary.outputs.ref }}"

      - name: Upload SBOM + scan artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-and-scan
          path: |
            sbom.spdx.json
            sbom.cdx.json
            grype.sarif
          if-no-files-found: warn

  smoke:
    name: Smoke-test tools inside image
    needs: merge
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.merge.outputs.primary-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: terraform
        run: terraform -version | tee /tmp/tf && grep -q "${{ env.TERRAFORM_VERSION || '' }}" /tmp/tf || true
      - name: terragrunt
        run: terragrunt --version
      - name: aws
        run: aws --version
      - name: jq
        run: jq --version
      - name: semantic-release CLI
        run: semantic-release --version
      - name: required semantic-release plugins present
        run: |
          set -euo pipefail
          npm ls -g --depth=0 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/exec \
            @semantic-release/github \
            @semantic-release/gitlab

  release:
    name: semantic-release
    needs: [merge, smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.merge.outputs.primary-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          semantic-release
